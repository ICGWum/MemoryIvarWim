<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Level Selection</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    /* HEADER */
    .header {
      margin-bottom: 30px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #94a3b8;
    }

    /* SECTION CARD */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-top: 15px;
    }

    .tile {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }

    .tile:hover {
      transform: translateY(-3px);
      border-color: #38bdf8;
    }

    .tile.active {
      border-color: #38bdf8;
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }

    .thumb {
      font-size: 32px;
      margin-bottom: 8px;
    }

    /* DIFFICULTY */
    .difficulty-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .difficulty {
      padding: 12px 14px;
      border-radius: 12px;
      background: #0f172a;
      border: 2px solid #334155;
      cursor: pointer;
      transition: 0.2s;
    }

    .difficulty:hover {
      border-color: #38bdf8;
    }

    .difficulty.active {
      background: #38bdf8;
      color: #0f172a;
      border-color: #38bdf8;
      font-weight: bold;
    }

    .hint {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    /* START BUTTON */
    .start {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #22c55e;
      color: #0f172a;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
    }

    .start:hover {
      opacity: 0.9;
    }

    /* BACK LINK */
    .back {
      display: inline-block;
      margin-top: 20px;
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>Select Your Game</h1>
    <div class="subtitle">Choose a region and difficulty to start playing</div>
  </div>

  <!-- CONTINENT -->
  <div class="card">
    <h2>🌍 Region</h2>

    <div class="grid" id="continentGrid">

      <div class="tile" data-continent="World">
        <div class="thumb">🌍</div>
        <div>World</div>
      </div>

      <div class="tile" data-continent="Africa">
        <div class="thumb">🌍</div>
        <div>Africa</div>
      </div>

      <div class="tile" data-continent="Asia">
        <div class="thumb">🌏</div>
        <div>Asia</div>
      </div>

      <div class="tile" data-continent="Europe">
        <div class="thumb">🌍</div>
        <div>Europe</div>
      </div>

      <div class="tile" data-continent="Americas">
        <div class="thumb">🌎</div>
        <div>Americas</div>
      </div>

      <div class="tile" data-continent="Oceania">
        <div class="thumb">🌊</div>
        <div>Oceania</div>
      </div>

    </div>
  </div>

  <!-- DIFFICULTY -->
  <div class="card">
    <h2>⚡ Difficulty</h2>
    <div class="hint">Higher difficulty = more detail required</div>

    <div class="difficulty-grid" id="difficultyGrid">

      <div class="difficulty" data-difficulty="Easy">
        Easy
      </div>

      <div class="difficulty" data-difficulty="Normal">
        Normal
      </div>

      <div class="difficulty" data-difficulty="Hard">
        Hard
      </div>

      <div class="difficulty" data-difficulty="Extreme">
        Extreme
      </div>

    </div>
  </div>

  <button class="start" id="startBtn">
    ▶ Start Game
  </button>

  <a class="back" href="index.html">← Back to home</a>

</div>

<script>
  const CONT_KEY = "miw_selected_continent";
  const DIFF_KEY = "miw_selected_difficulty";

  let selectedContinent = localStorage.getItem(CONT_KEY) || "World";
  let selectedDifficulty = localStorage.getItem(DIFF_KEY) || "Easy";

  // CONTINENT
  const continentTiles = document.querySelectorAll(".tile");

  function updateContinents() {
    continentTiles.forEach(t => {
      t.classList.toggle(
        "active",
        t.dataset.continent === selectedContinent
      );
    });
  }

  continentTiles.forEach(tile => {
    tile.addEventListener("click", () => {
      selectedContinent = tile.dataset.continent;
      localStorage.setItem(CONT_KEY, selectedContinent);
      updateContinents();
    });
  });

  updateContinents();

  // DIFFICULTY
  const diffTiles = document.querySelectorAll(".difficulty");

  function updateDifficulty() {
    diffTiles.forEach(d => {
      d.classList.toggle(
        "active",
        d.dataset.difficulty === selectedDifficulty
      );
    });
  }

  diffTiles.forEach(tile => {
    tile.addEventListener("click", () => {
      selectedDifficulty = tile.dataset.difficulty;
      localStorage.setItem(DIFF_KEY, selectedDifficulty);
      updateDifficulty();
    });
  });

  updateDifficulty();

  // START
  document.getElementById("startBtn").addEventListener("click", () => {
    localStorage.setItem(CONT_KEY, selectedContinent);
    localStorage.setItem(DIFF_KEY, selectedDifficulty);
    window.location.href = "game.html";
  });
</script>

<script src="../scripts/auth.js"></script>

</body>
</html>
