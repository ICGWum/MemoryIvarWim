<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        :root {
            --button-color: #2563eb;
            --card-color: #374151;
            --card-revealed: #dbeafe;
            --panel-bg: rgba(15, 23, 42, 0.9);
            --panel-border: rgba(148, 163, 184, 0.24);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #111827;
            color: #f9fafb;
        }

        main {
            width: min(2000px, 100%);
            margin: 0 auto;
            padding: 2rem 1.25rem 3rem;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 1.5rem;
            align-items: start;
        }

        .game {
            text-align: center;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
            color: #cbd5e1;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.1rem;
            max-width: 1500px;
            margin: 0 auto;
        }

        .card {
            aspect-ratio: 1;
            border: 0;
            border-radius: 20px;
            background: var(--card-color);
            color: #f8fafc;

            font-size: clamp(0.9rem, 1.2vw, 1.4rem);
            font-weight: 800;

            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);

            display: flex;
            align-items: center;
            justify-content: center;

            text-align: center;

            overflow: hidden;

            
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;

            padding: 10px;
            line-height: 1.2;

            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .card:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
        }

        .card.revealed,
        .card.matched {
            background: var(--card-revealed);
            color: #0f172a;
        }

        .card:disabled {
            cursor: default;
        }

        .message {
            min-height: 1.5em;
            margin: 1rem 0 1.5rem;
            color: #e2e8f0;
        }

        .controls {
            margin-bottom: 1.5rem;
        }

        .button {
            display: inline-block;
            border: 0;
            border-radius: 999px;
            padding: 0.8rem 1.3rem;
            background: var(--button-color);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .button:hover {
            background: var(--button-color);
        }

        a {
            color: #93c5fd;
        }

        .sidebar {
            position: sticky;
            top: 1.25rem;
            align-self: start;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 20px;
            padding: 1.1rem;
            backdrop-filter: blur(12px);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
        }

        .sidebar h2 {
            margin: 0 0 1rem;
            font-size: 1.2rem;
        }

        .panel-grid {
            display: grid;
            gap: 0.75rem;
        }

        .panel-item {
            padding: 0.85rem 0.95rem;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .panel-label {
            display: block;
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 0.3rem;
        }

        .panel-value {
            font-size: 1.05rem;
            font-weight: 700;
            color: #f8fafc;
        }

        .panel-note {
            margin-top: 1rem;
            font-size: 0.95rem;
            line-height: 1.4;
            color: #cbd5e1;
        }

        .panel-note.warning {
            color: #fbbf24;
        }

        @media (max-width: 900px) {
            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                order: -1;
            }
        }
    </style>
</head>

<body>
    <main>
        <div class="layout">
            <section class="game">
                <h1>Memory Match</h1>
                <p>Flip cards, find pairs, and clear the board in as few attempts as possible.</p>

                <div class="controls">
                    <button class="button" id="restartButton" type="button">restart game</button>
                </div>

                <div class="stats" aria-live="polite">
                    <span>Matches: <strong id="matches">0</strong></span>
                </div>

                <p class="message" id="message">Find every matching pair to win.</p>

                <div class="board" id="board" aria-label="Memory game board"></div>

                <p><a href="index.html">Back to the front page</a></p>
            </section>

            <aside class="sidebar" aria-label="Game score panel">
                <h2>Score</h2>
                <div class="panel-grid">
                    <div class="panel-item">
                        <span class="panel-label">Score</span>
                        <div class="panel-value" id="score">0</div>
                    </div>
                    <div class="panel-item">
                        <span class="panel-label">Time played</span>
                        <div class="panel-value"><span id="timePlayed">0</span>s</div>
                    </div>
                    <div class="panel-item">
                        <span class="panel-label">Attempts</span>
                        <div class="panel-value" id="attemptsSide">0</div>
                    </div>
                    <div class="panel-item">
                        <span class="panel-label">Region</span>
                        <div class="panel-value" id="regionValue">Europe</div>
                    </div>
                    <div class="panel-item">
                        <span class="panel-label">Difficulty</span>
                        <div class="panel-value" id="difficultyValue">Easy</div>
                    </div>
                </div>

                <div class="panel-note" id="saveStatus"></div>
            </aside>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script type="module" src="../scripts/game.js"></script>
    <script src="../scripts/auth.js"></script>
</body>
</html>
