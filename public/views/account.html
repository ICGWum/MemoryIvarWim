<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Overview</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, Arial, sans-serif;
            background: #0f172a;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .profile-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background: #334155;
            border: 4px solid #38bdf8;
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .profile-info p {
            color: #94a3b8;
        }

        .email-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 24px;
        }

        .stat-title {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        .section-title {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-row {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-date {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .game-api {
            color: #38bdf8;
        }

        .game-score {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .preferences {
            display: grid;
            gap: 15px;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            color: #cbd5e1;
        }

        input {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
        }

        input[type="color"] {
            height: 50px;
            padding: 5px;
        }

        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: bold;
            cursor: pointer;
            transition: .2s;
        }

        button:hover {
            opacity: .9;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: #38bdf8;
            text-decoration: none;
        }

        .empty-games {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 800px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .game-row {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="profile-card">
        <img
            id="avatar"
            class="avatar"
            src="https://ui-avatars.com/api/?name=Player&background=0f172a&color=ffffff"
            alt="Avatar"
        >

        <div class="profile-info">
            <h1 id="username">Loading...</h1>

            <div class="email-row">
                <input id="email" type="email">
                <button id="saveEmail">Save Email</button>
            </div>
        </div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <div class="stat-title">🏆 Best Score</div>
            <div class="stat-value" id="bestScore">0</div>
        </div>

        <div class="card">
            <div class="stat-title">🎮 Games Played</div>
            <div class="stat-value" id="totalGames">0</div>
        </div>

        <div class="card">
            <div class="stat-title">📈 Average Score</div>
            <div class="stat-value" id="averageScore">0</div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 24px;">
        <h2 class="section-title">Latest Games</h2>

        <div id="latestGames" class="game-list">
            <div class="empty-games">Loading games...</div>
        </div>
    </div>

    <div class="card">
        <h2 class="section-title">Preferences</h2>

        <div class="preferences">
            <label>
                Favorite Mode 
                <input id="api" type="text">
            </label>

            <label>
                Found Cards Color
                <input id="foundColor" type="color">
            </label>

            <label>
                Closed Cards Color
                <input id="closedColor" type="color">
            </label>

            <button id="savePreferences">
                Save Preferences
            </button>
        </div>
    </div>

    <a href="index.html" class="back-link">
        ← Back to front page
    </a>

</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        await Promise.all([
            loadPlayer(),
            loadPreferences()
        ]);
    });

    async function loadPlayer() {
        const res = await fetch("http://127.0.0.1:8000/player");

        if (!res.ok) return;

        const player = await res.json();

        document.getElementById("username").textContent =
            player.name;

        document.getElementById("email").value =
            player.email ?? "";

        if (player.avatar) {
            document.getElementById("avatar").src =
                player.avatar;
        } else {
            document.getElementById("avatar").src =
                `https://ui-avatars.com/api/?name=${encodeURIComponent(player.name)}&background=0f172a&color=ffffff`;
        }

        const games = player.games ?? [];

        document.getElementById("totalGames").textContent =
            games.length;

        const bestScore = games.length
            ? Math.min(...games.map(g => g.score))
            : 0;

        document.getElementById("bestScore").textContent =
            bestScore;

        const average = games.length
            ? Math.round(
                games.reduce((sum, g) => sum + g.score, 0) /
                games.length
            )
            : 0;

        document.getElementById("averageScore").textContent =
            average;

        const latestGames = [...games]
            .sort((a, b) =>
                new Date(b.date.date) -
                new Date(a.date.date)
            )
            .slice(0, 3);

        const container =
            document.getElementById("latestGames");

        if (!latestGames.length) {
            container.innerHTML =
                '<div class="empty-games">No games played yet.</div>';
            return;
        }

        container.innerHTML = latestGames.map(game => `
            <div class="game-row">
                <div>
                    <div>${game.day}</div>
                    <div class="game-date">
                        ${game.api || "Default"}
                    </div>
                </div>

                <div class="game-score">
                    ${game.score}
                </div>
            </div>
        `).join("");
    }

    async function loadPreferences() {
        const res = await fetch(
            "http://127.0.0.1:8000/player/preferences"
        );

        if (!res.ok) return;

        const data = await res.json();

        document.getElementById("api").value =
            data.api ?? "";

        document.getElementById("foundColor").value =
            data.foundColor ?? "#00ff00";

        document.getElementById("closedColor").value =
            data.closedColor ?? "#ff0000";
    }

    document.getElementById("savePreferences")
        .addEventListener("click", async () => {

            const payload = {
                api: document.getElementById("api").value,
                color_found: document.getElementById("foundColor").value,
                color_closed: document.getElementById("closedColor").value
            };

            const res = await fetch(
                "http://127.0.0.1:8000/player/preferences",
                {
                    method: "POST",
                    body: JSON.stringify(payload)
                }
            );

            if (res.status === 204) {
                alert("Preferences saved!");
            } else {
                alert("Saving failed.");
            }
        });

    document.getElementById("saveEmail")
        .addEventListener("click", async () => {

            const payload = {
                email: document.getElementById("email").value
            };

            const res = await fetch(
                "http://127.0.0.1:8000/player/email",
                {
                    method: "PUT",
                    body: JSON.stringify(payload)
                }
            );

            if (res.status === 204) {
                alert("Email updated!");
            } else {
                alert("Update failed.");
            }
        });
</script>

<script src="../scripts/auth.js"></script>

</body>
</html>
