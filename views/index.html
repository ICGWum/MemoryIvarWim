<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geography Memory Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #f5efe6, #e6f0ff);
            color: #1f2937;
        }

        main {
            max-width: 640px;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.82);
            border-radius: 20px;
            box-shadow: 0 18px 50px rgba(31, 41, 55, 0.12);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: clamp(2.5rem, 6vw, 4rem);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }

        .button {
            display: inline-block;
            padding: 0.95rem 1.6rem;
            border-radius: 999px;
            background: #1f4ed8;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .button:hover {
            background: #173fb0;
        }

        #topScores {
            list-style: none;
            padding: 0;
            margin: 1rem 0 2rem;
        }

        #topScores li {
            background: white;
            margin: 0.5rem 0;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>

<body>
    <main>
        <h1>Memory Match</h1>
        <p>This site offers a memory game where you flip cards, find matching pairs, and train your focus while racing to remember every move.</p>

        <label for="colorPicker">Choose a theme color:</label>

        <input type="color" id="colorPicker" value="#3498db">

        <button class="button" id="saveTheme">
            Apply Theme
        </button>

        <a class="button" href="level_selection.html">go play</a>
        <a class="button" href="register.html">Register Account</a>
        <a class="button" href="login.html">Login</a>

        <h2>Top 5 Players</h2>
        <ul id="topScores"></ul>

    </main>

    <script>
        const colorPicker = document.getElementById("colorPicker");
        const saveTheme = document.getElementById("saveTheme");

        saveTheme.addEventListener("click", async () => {

            const hex = colorPicker.value.replace("#", "");

            const response = await fetch(
                `https://www.thecolorapi.com/scheme?hex=${hex}&mode=analogic&count=5`
            );

            const data = await response.json();

            const colors = data.colors.map(color => color.hex.value);

            localStorage.setItem(
                "themeColors",
                JSON.stringify(colors)
            );

            alert("Theme saved!");
        });

        async function loadTopScores() {
            try {
                const response = await fetch("http://127.0.0.1:8000/memory/top-scores");

                if (!response.ok) {
                    throw new Error("Could not load scores");
                }

                const scores = await response.json();

                const topScoresList = document.getElementById("topScores");
                topScoresList.innerHTML = "";

                scores.slice(0, 5).forEach(player => {
                    const li = document.createElement("li");

                    // Pas propertynamen aan naar wat jouw API terugstuurt
                    li.textContent = `${player.username} - ${player.score}`;

                    topScoresList.appendChild(li);
                });
            } catch (error) {
                console.error(error);
            }
        }

        loadTopScores();
    </script>
    
</body>

</html>
