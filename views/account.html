<!DOCTYPE html>
    <html lang="nl">
        <head>
            <meta charset="UTF-8">
            <title>Account</title>
            <style>
                body {
                    font-family: Arial, sans-serif;
                    max-width: 700px;
                    margin: 40px auto;
                }

                section {
                    padding: 20px;
                    border: 1px solid #ddd;
                    margin-bottom: 20px;
                    border-radius: 8px;
                }

                label {
                    display: block;
                    margin-top: 10px;
                }

                input {
                    padding: 6px;
                    margin-top: 5px;
                    width: 100%;
                    max-width: 300px;
                }

                button {
                    margin-top: 15px;
                    padding: 8px 12px;
                    cursor: pointer;
                }

                h1 {
                    margin-bottom: 30px;
                }
            </style>
        </head>
        <body>

        <h1>Account</h1>

        <section>
            <h2>Voorkeuren</h2>

            <label>Favoriete image API</label>
            <input id="api" type="text">

            <label>Kleur gevonden kaarten</label>
            <input id="foundColor" type="color">

            <label>Kleur gesloten kaarten</label>
            <input id="closedColor" type="color">

            <button id="savePreferences">Voorkeuren opslaan</button>
        </section>

        <section>
            <h2>Email</h2>

            <label>Email</label>
            <input id="email" type="email">

            <button id="saveEmail">Email wijzigen</button>
        </section>

        <p><a href="index.html">Back to the front page</a></p>

        <script>
            document.addEventListener("DOMContentLoaded", async () => {
                await loadPreferences();
                await loadEmail();
            });

            async function loadPreferences() {
                const res = await fetch(`http://127.0.0.1:8000/player/preferences`);

                if (!res.ok) return;

                const data = await res.json();

                document.getElementById("api").value = data.api ?? "";
                document.getElementById("foundColor").value = data.foundColor ?? "#00ff00";
                document.getElementById("closedColor").value = data.closedColor ?? "#ff0000";
            }

            async function loadEmail() {
                const res = await fetch(`http://127.0.0.1:8000/player/email`);

                console.log(res);

                if (!res.ok) return;

                const email = await res.json();
                document.getElementById("email").value = email ?? "";
            }

            document.getElementById("savePreferences").addEventListener("click", async () => {
                const payload = {
                    api: document.getElementById("api").value,
                    foundColor: document.getElementById("foundColor").value,
                    closedColor: document.getElementById("closedColor").value
                };

                const res = await fetch(`http://127.0.0.1:8000/player/preferences`, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                if (res.status === 204) {
                    alert("Voorkeuren opgeslagen!");
                } else {
                    alert("Opslaan mislukt");
                }
            });

            document.getElementById("saveEmail").addEventListener("click", async () => {
                const payload = {
                    email: document.getElementById("email").value
                };

                const res = await fetch(`http://127.0.0.1:8000/player/email`, {
                    method: "PUT",
                    body: JSON.stringify(payload)
                });

                if (res.status === 204) {
                    alert("Email gewijzigd!");
                } else {
                    alert("Wijzigen mislukt");
                }
            });
        </script>

        <script src="../scripts/auth.js"></script>
        </body>
    </html>
