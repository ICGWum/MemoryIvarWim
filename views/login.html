<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 { text-align: center; }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 10px;
            font-size: 16px;
        }

        button, input[type="submit"] {
            padding: 12px;
            cursor: pointer;
        }

        .github-btn {
            margin-top: 15px;
            width: 100%;
            background: #24292e;
            color: white;
            border: none;
            border-radius: 6px;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Login</h1>

<form id="loginForm">
    <label>Username</label>
    <input type="text" id="username" required>

    <label>Password</label>
    <input type="password" id="password" required>

    <input type="submit" value="Login">
</form>

<button class="github-btn" id="githubLoginBtn">
    Login with GitHub
</button>

<div id="message"></div>

<p><a href="index.html">Back to the front page</a></p>

<script>
    const message = document.getElementById("message");

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const payload = {
            username: document.getElementById("username").value,
            password: document.getElementById("password").value
        };

        try {
            const response = await fetch(`http://127.0.0.1:8000/memory/login`, {
                method: "POST",
                body: JSON.stringify(payload)
            });

            const token = await response.json();
            console.log(response);

            if (response.status === 200 && token) {
                localStorage.setItem("token", token.token);

                message.style.color = "green";
                message.textContent = "Login successful! Redirecting...";

                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            } else {
                message.style.color = "red";
                message.textContent = "Login failed. Please try again.";
                console.error("Login failed");
            }

        } catch (err) {
            message.style.color = "red";
            message.textContent = "Could not connect to server.";
            console.error(err);
        }
    });

    document.getElementById("githubLoginBtn").addEventListener("click", () => {
        window.location.href = `http://127.0.0.1:8000/connect/github`;
    });

    (function handleGithub() {
    if (window.location.href.includes("/connect/github/check")) {

        fetch(window.location.href)
            .then(res => res.json())
            .then(data => {
                if (data.token) {
                    localStorage.setItem("token", data.token);

                    window.location.href = "index.html";
                }
            });

        return;
    }

    // normale flow (bij redirect met query params - blijft bestaan)
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");

    if (token) {
        localStorage.setItem("token", token);

        message.style.color = "green";
        message.textContent = "GitHub login successful! Redirecting...";

        window.history.replaceState({}, document.title, "/login.html");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 1000);
    }
})();
</script>

<script src="../scripts/auth.js"></script>
</body>
</html>
