<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game</title>
    <style>
        :root {
            --button-color: #2563eb;
            --card-color: #374151;
            --card-revealed: #dbeafe;
        }
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: #111827;
            color: #f9fafb;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.25rem 3rem;
            text-align: center;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: clamp(2.2rem, 5vw, 3.5rem);
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
            color: #cbd5e1;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
            gap: 0.9rem;
            max-width: 640px;
            margin: 0 auto;
        }

        .card {
            aspect-ratio: 1;
            border: 0;
            border-radius: 18px;
            background: var(--card-color);
            color: #f8fafc;
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
        }

        .card.revealed,
        .card.matched {
            background: var(--card-revealed);
            color: #0f172a;
        }

        .card:disabled {
            cursor: default;
        }

        .message {
            min-height: 1.5em;
            margin: 1rem 0 1.5rem;
            color: #e2e8f0;
        }

        .controls {
            margin-bottom: 1.5rem;
        }

        .button {
            display: inline-block;
            border: 0;
            border-radius: 999px;
            padding: 0.8rem 1.3rem;
            background: var(--button-color);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .button:hover {
            background: var(--button-color);
        }

        a {
            color: #93c5fd;
        }
    </style>
</head>

<body>
    <main>
        <h1>Memory Match</h1>
        <p>Flip cards, find pairs, and clear the board in as few attempts as possible.</p>

        <div class="controls">
            <button class="button" id="restartButton" type="button">restart game</button>
        </div>

        <div class="stats" aria-live="polite">
            <span>Attempts: <strong id="attempts">0</strong></span>
            <span>Matches: <strong id="matches">0</strong></span>
        </div>

        <p class="message" id="message">Find every matching pair to win.</p>

        <div class="board" id="board" aria-label="Memory game board"></div>

        <p><a href="index.html">Back to the front page</a></p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script type="module" src="../scripts/game.js"></script>
</body>

</html>
